name: consumo-sostenible

services:

  api:
    build:
      context: ../Backend-Consumo-Sostenible
      dockerfile: Dockerfile
      target: production
    container_name: consumo-sostenible-Backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../Backend-Consumo-Sostenible/.env
    environment:
      NODE_ENV: production
      AI_API_URL: http://host.docker.internal:8077/upload-comment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/
    container_name: consumo-sostenible-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
