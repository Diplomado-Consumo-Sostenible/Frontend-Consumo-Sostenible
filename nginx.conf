server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip para assets estáticos ──────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Fallback a index.html para React Router ────────────────
    # Sin esto, rutas como /dashboard, /adminDashboard, /login
    # devuelven 404 al refrescar la página.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets con caché larga (Vite genera hashes en el nombre) ─
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Seguridad básica ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
